<!DOCTYPE html>
<html>
<head>
    <title>Pulmo Bot</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="../static/style.css">
</head>

<body>

<div class="container-fluid">
    <div class="chat">
        <div class="card">

            <!-- Header -->
            <div class="card-header msg_head">
                <div class="d-flex align-items-center">
                    <div class="img_cont">
                        <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="user_img">
                        <span class="online_icon"></span>
                    </div>
                    <div class="user_info">
                        <span>Medical Chatbot</span>
                        <p>Ask me anything!</p>
                    </div>
                </div>
            </div>

            <!-- Chat Body -->
            <div id="messageFormeight" class="msg_card_body">

                <!-- Default Message -->
                <div class="d-flex mb-3">
                    <div class="img_cont_msg">
                        <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="user_img_msg">
                    </div>
                    <div class="msg_cotainer">
                        Hi 👋 I'm your medical assistant.<br>
                        Did you know your lungs take around 20,000 breaths a day? 🫁<br>
                        Ask me anything about breathing, lungs, or health!
                        <span class="msg_time">Now</span>
                    </div>
                </div>

            </div>

            <!-- Footer -->
            <div class="card-footer">
                <form id="messageArea" class="d-flex w-100">
                    <input type="text" id="text" name="msg" placeholder="Type your message..." class="type_msg" required>
                    <button type="submit" class="send_btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    $("#messageArea").on("submit", function(event) {

        const date = new Date();
        const str_time = date.getHours() + ":" + date.getMinutes();
        var rawText = $("#text").val();

        var userHtml = `
        <div class="d-flex justify-content-end mb-3">
            <div class="msg_cotainer_send">${rawText}
                <span class="msg_time_send">${str_time}</span>
            </div>
        </div>`;

        $("#text").val("");
        $("#messageFormeight").append(userHtml);

        $.ajax({
            data: { msg: rawText },
            type: "POST",
            url: "/get",
        }).done(function(data) {

            var botHtml = `
            <div class="d-flex mb-3">
                <div class="img_cont_msg">
                    <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="user_img_msg">
                </div>
                <div class="msg_cotainer">${data}
                    <span class="msg_time">${str_time}</span>
                </div>
            </div>`;

            $("#messageFormeight").append(botHtml);

            $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);
        });

        event.preventDefault();
    });
});
</script>

</body>
</html>
